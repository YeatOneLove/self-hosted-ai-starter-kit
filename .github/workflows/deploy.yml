name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to Droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          port: 22
          source: "docker-compose.yml,n8n/,shared/"
          target: "/opt/self-hosted-ai"
          strip_components: 0

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          password: ${{ secrets.DO_PASSWORD }}
          port: 22
          # Ollama image is several GB — give the background script enough time
          command_timeout: 60m
          script: |
            set -e

            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              systemctl enable docker
              systemctl start docker
            fi

            cd /opt/self-hosted-ai

            # Write .env from secrets
            cat > .env <<ENVEOF
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            N8N_ENCRYPTION_KEY=${{ secrets.N8N_ENCRYPTION_KEY }}
            N8N_USER_MANAGEMENT_JWT_SECRET=${{ secrets.N8N_USER_MANAGEMENT_JWT_SECRET }}
            ENVEOF

            # Run the heavy lifting in the background so SSH session can exit cleanly.
            # Logs go to /opt/self-hosted-ai/deploy.log — check there if anything goes wrong.
            nohup bash -c '
              set -e
              cd /opt/self-hosted-ai

              # Pull images quietly (suppresses the per-byte extraction spam)
              docker compose pull --quiet 2>&1 | grep -v "^err:  " || true

              # Start / update stack
              docker compose up -d --remove-orphans

              # Clean up dangling images
              docker image prune -f
            ' > /opt/self-hosted-ai/deploy.log 2>&1 &

            echo "Deploy started in background (PID $!). Tail /opt/self-hosted-ai/deploy.log on the Droplet to follow progress."
